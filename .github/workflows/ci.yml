name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Wipe the incremental build cache so typecheck sees the real state.
      # (Local dev has been bitten by stale tsbuildinfo letting bad code
      # ship to prod before — see commit 8e2aae6.)
      - name: Typecheck (clean)
        run: |
          rm -f tsconfig.tsbuildinfo
          npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true # don't block merges on lint warnings yet

      # Inherited from the old firebase-hosting-merge.yml workflow (removed
      # with the Vercel migration). 21/165 tests currently fail on main, so
      # this stays non-blocking until the suite is green.
      - name: Test (vitest)
        run: npm test
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # The build calls `assertRequiredEnv()` in src/lib/env/required.ts
          # during page-data collection. We provide harmless placeholders so
          # the build succeeds — real secrets come from Vercel env at runtime,
          # never from CI.
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-do-not-use-at-runtime
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
