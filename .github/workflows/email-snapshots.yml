name: Email snapshots

on:
  pull_request:
    branches: [main]
    # Only run when something that affects emails has changed.
    paths:
      - 'src/lib/email/**'
      - 'src/locales/**'
      - 'scripts/render-email-snapshots.ts'
      - '.github/workflows/email-snapshots.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshots:
    name: Render & upload email snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Render snapshots
        run: npx tsx scripts/render-email-snapshots.ts

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: email-snapshots-${{ github.event.pull_request.number }}
          path: .email-snapshots/
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '📧 **Email snapshots ready**',
              '',
              `${5} templates × 3 locales rendered to static HTML.`,
              `Download them from the [run artifacts](${runUrl}#artifacts), open \`index.html\` to browse.`,
              '',
              '_Use this to catch brand drift before it ships (logo, typography, gold accents, footer)._',
            ].join('\n');

            // Replace previous comment from this workflow if it exists.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith('📧 **Email snapshots ready**'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
